<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="codemagic-to-yaml">
  <rect width="64" height="64" rx="14" fill="#0ea5e9"/>
  <!-- JSON braces -->
  <text x="14" y="40" font-family="ui-monospace, Menlo, monospace" font-size="20" font-weight="700" fill="#e0f2fe" text-anchor="middle">{ }</text>
  <!-- arrow -->
  <path d="M28 32 h10 m-4 -4 l4 4 l-4 4" fill="none" stroke="#e0f2fe" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- YAML -->
  <text x="50" y="38" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="700" fill="#e0f2fe" text-anchor="middle">yml</text>
</svg>
